services:

  mongodb:
    image: mongo:6
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    networks:
      - app-network

  backend:
    image: task-manager-mern-backend:latest 
    container_name: task-backend

    ports:
      - "5000:5000"

    environment:
      NODE_ENV: PRODUCTION
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/taskdb

    depends_on:
      - mongodb

    restart: always
    networks:
      - app-network

  frontend:
    image: task-manager-mern-frontend:latest 
    container_name: task-frontend

    ports:
      - "3000:3000"

    environment:
      REACT_APP_API_URL: http://backend:5000

    depends_on:
      - backend

    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge