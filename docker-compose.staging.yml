services:

  backend-staging:
    image: monteey/task-manager-backend:staging

    container_name: task-backend-staging

    ports:
      - "5001:5000"

    environment:
      NODE_ENV: staging
      PORT: 5000

    restart: always

    networks:
      - app-network



  frontend-staging:
    image: monteey/task-manager-frontend:staging

    container_name: task-frontend-staging

    ports:
      - "3001:3000"

    environment:
      REACT_APP_API_URL: http://localhost:5001

    depends_on:
      - backend-staging

    restart: always

    networks:
      - app-network



networks:
  app-network:
    driver: bridge